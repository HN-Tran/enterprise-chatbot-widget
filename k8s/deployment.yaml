apiVersion: v1
kind: Namespace
metadata:
  name: placebo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-widget
  namespace: placebo
  labels:
    app: chatbot-widget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-widget
  template:
    metadata:
      labels:
        app: chatbot-widget
    spec:
      containers:
        - name: chatbot-widget
          image: harbor.example.com/myproject/enterprise-chatbot-widget:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-widget
  namespace: placebo
  labels:
    app: chatbot-widget
spec:
  selector:
    app: chatbot-widget
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot-widget
  namespace: placebo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: test8.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot-widget
                port:
                  number: 80
